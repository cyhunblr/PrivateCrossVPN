name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: auto-release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest_tag" ]]; then
            base_version="1.1.0"
          else
            base_version="${latest_tag#v}"
          fi

          IFS='.' read -r major minor patch <<< "$base_version"
          next_patch=$((patch + 1))
          version="${major}.${minor}.${next_patch}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: version
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ctkPath = python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))"
          python -m PyInstaller --noconfirm --onefile --windowed `
            --name "PrivateCrossVPN-$env:PVCVPN_VERSION-windows" `
            --add-data "$ctkPath;customtkinter" `
            --add-data "img;img" `
            --icon "img\logo.ico" `
            privatecrossvpn.py
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist\PrivateCrossVPN-$env:PVCVPN_VERSION-windows.exe" "release-assets\PrivateCrossVPN-windows.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: release-assets/PrivateCrossVPN-windows.exe

  build-linux:
    needs: version
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-20.04
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux binary
        run: |
          ctk_path=$(python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))")
          python -m PyInstaller --noconfirm --onefile --windowed \
            --name "PrivateCrossVPN-${PVCVPN_VERSION}-ubuntu20.04" \
            --add-data "${ctk_path}:customtkinter" \
            --add-data "img:img" \
            privatecrossvpn.py
          mkdir -p release-assets
          cp "dist/PrivateCrossVPN-${PVCVPN_VERSION}-ubuntu20.04" release-assets/PrivateCrossVPN-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: release-assets/PrivateCrossVPN-linux

  publish-release:
    needs:
      - version
      - build-windows
      - build-linux
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Create and push version tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: |
            release-assets/PrivateCrossVPN-windows.exe
            release-assets/PrivateCrossVPN-linux