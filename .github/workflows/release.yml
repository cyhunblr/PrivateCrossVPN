name: Release

on:
  workflow_run:
    workflows:
      - CI Python
      - CI Markdown
      - CI Mobile
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: auto-release-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  version:
    # CI başarılıysa veya manuel tetiklendiyse çalış
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      release_allowed: ${{ steps.freshness.outputs.release_allowed }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine next version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest_tag" ]]; then
            base_version="1.7.2"
            log_range="HEAD"
          else
            base_version="${latest_tag#v}"
            log_range="${latest_tag}..HEAD"
          fi

          commit_subjects=$(git log --format=%s $log_range || true)

          bump_type="patch"
          if echo "$commit_subjects" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump_type="minor"
          fi

          IFS='.' read -r major minor patch <<< "$base_version"
          case "$bump_type" in
            major)
              version="$((major + 1)).0.0"
              ;;
            minor)
              version="${major}.$((minor + 1)).0"
              ;;
            *)
              version="${major}.${minor}.$((patch + 1))"
              ;;
          esac

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check commit freshness
        id: freshness
        shell: bash
        run: |
          set -euo pipefail
          target_sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          latest_main_sha=$(git rev-parse origin/main)

          if [[ "$target_sha" != "$latest_main_sha" ]]; then
            echo "release_allowed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping stale run. target=$target_sha latest_main=$latest_main_sha"
            exit 0
          fi

          # Check if there are any commits that warrant a release (feat, fix, breaking changes)
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [[ -z "$latest_tag" ]]; then
            log_range="HEAD"
          else
            log_range="${latest_tag}..HEAD"
          fi

          commit_subjects=$(git log --format=%s $log_range || true)
          commit_bodies=$(git log --format=%B $log_range || true)

          has_releasable_commits=false
          if echo "$commit_subjects" | grep -Eq '^feat(\([^)]+\))?:'; then
            has_releasable_commits=true
          elif echo "$commit_subjects" | grep -Eq '^fix(\([^)]+\))?:'; then
            has_releasable_commits=true
          fi

          if [[ "$has_releasable_commits" == "true" ]]; then
            echo "release_allowed=true" >> "$GITHUB_OUTPUT"
            echo "Release allowed for latest main SHA: $target_sha"
          else
            echo "release_allowed=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release: only non-functional commits (chore, docs, style, ci, build)"
          fi

  build-windows:
    needs: version
    if: needs.version.outputs.release_allowed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            artifact_id: windows-binary-windows-latest
            artifact_name: PrivateCrossVPN-windows-latest.exe
    runs-on: ${{ matrix.runner }}
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT_NAME: ${{ matrix.artifact_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ctkPath = python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))"
          python -m PyInstaller --noconfirm --onefile --windowed --uac-admin `
            --name "PrivateCrossVPN-$env:PVCVPN_VERSION-${{ matrix.runner }}" `
            --add-data "$ctkPath;customtkinter" `
            --add-data "img;img" `
            --icon "img\logo.ico" `
            privatecrossvpn.py
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist\PrivateCrossVPN-$env:PVCVPN_VERSION-${{ matrix.runner }}.exe" "release-assets\$env:ARTIFACT_NAME"

      - name: Sign Windows executable
        if: env.SIGNING_CERT != ''
        env:
          SIGNING_CERT: ${{ secrets.WIN_SIGNING_CERT_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.WIN_SIGNING_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT)
          $certPath = "cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $exePath = "release-assets\$env:ARTIFACT_NAME"
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
            /f $certPath /p $env:SIGNING_PASSWORD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
            /d "PrivateCrossVPN" $exePath
          Remove-Item $certPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_id }}
          path: release-assets/${{ matrix.artifact_name }}

  build-linux-self-hosted-20:
    needs: version
    if: needs.version.outputs.release_allowed == 'true'
    runs-on:
      - self-hosted
      - linux
      - x64
      - ubuntu-20.04
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT_NAME: PrivateCrossVPN-linux-ubuntu-20.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux binary (self-hosted ubuntu-20.04)
        run: |
          ctk_path=$(python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))")
          python -m PyInstaller --noconfirm --onefile --windowed \
            --name "PrivateCrossVPN-${PVCVPN_VERSION}-linux-ubuntu-20.04" \
            --add-data "${ctk_path}:customtkinter" \
            --add-data "img:img" \
            privatecrossvpn.py
          mkdir -p release-assets
          cp "dist/PrivateCrossVPN-${PVCVPN_VERSION}-linux-ubuntu-20.04" "release-assets/${ARTIFACT_NAME}"

      - name: Upload Linux artifact (self-hosted ubuntu-20.04)
        uses: actions/upload-artifact@v6
        with:
          name: linux-binary-ubuntu-20.04-self-hosted
          path: release-assets/PrivateCrossVPN-linux-ubuntu-20.04

  build-linux-github-hosted:
    needs: version
    if: needs.version.outputs.release_allowed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            artifact_id: linux-binary-ubuntu-22.04
            artifact_name: PrivateCrossVPN-linux-ubuntu-22.04
          - runner: ubuntu-24.04
            artifact_id: linux-binary-ubuntu-24.04
            artifact_name: PrivateCrossVPN-linux-ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT_NAME: ${{ matrix.artifact_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux binary
        run: |
          ctk_path=$(python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))")
          python -m PyInstaller --noconfirm --onefile --windowed \
            --name "PrivateCrossVPN-${PVCVPN_VERSION}-${{ matrix.runner }}" \
            --add-data "${ctk_path}:customtkinter" \
            --add-data "img:img" \
            privatecrossvpn.py
          mkdir -p release-assets
          cp "dist/PrivateCrossVPN-${PVCVPN_VERSION}-${{ matrix.runner }}" "release-assets/${ARTIFACT_NAME}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_id }}
          path: release-assets/${{ matrix.artifact_name }}

  build-android:
    needs: version
    if: needs.version.outputs.release_allowed == 'true'
    runs-on: ubuntu-latest
    env:
      PVCVPN_VERSION: ${{ needs.version.outputs.version }}
      ARTIFACT_NAME: PrivateCrossVPN-android-release.apk
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: Build Android APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release
          mkdir -p ../release-assets
          cp build/app/outputs/flutter-apk/app-release.apk ../release-assets/${ARTIFACT_NAME}

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-release
          path: release-assets/PrivateCrossVPN-android-release.apk

  publish-release:
    needs: [version, build-windows, build-linux-self-hosted-20, build-linux-github-hosted, build-android]
    if: needs.version.outputs.release_allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Create and push version tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Download Windows latest artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-binary-windows-latest
          path: release-assets

      - name: Download Linux 20.04 self-hosted artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-binary-ubuntu-20.04-self-hosted
          path: release-assets

      - name: Download Linux 22.04 artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-binary-ubuntu-22.04
          path: release-assets

      - name: Download Linux 24.04 artifact
        uses: actions/download-artifact@v7
        with:
          name: linux-binary-ubuntu-24.04
          path: release-assets

      - name: Download Android APK artifact
        uses: actions/download-artifact@v7
        with:
          name: android-apk-release
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: |
            Automated release from `main` after successful CI.

            ## Build Matrix
            | Target | Runner | Artifact |
            |---|---|---|
            | Windows x64 | `windows-latest` (GitHub-hosted) | `PrivateCrossVPN-windows-latest.exe` |
            | Linux x64 | `self-hosted` labels: `self-hosted,linux,x64,ubuntu-20.04` | `PrivateCrossVPN-linux-ubuntu-20.04` |
            | Linux x64 | `ubuntu-22.04` (GitHub-hosted) | `PrivateCrossVPN-linux-ubuntu-22.04` |
            | Linux x64 | `ubuntu-24.04` (GitHub-hosted) | `PrivateCrossVPN-linux-ubuntu-24.04` |
            | Android | `ubuntu-latest` (GitHub-hosted) | `PrivateCrossVPN-android-release.apk` |

            Commit: `${{ github.event.workflow_run.head_sha || github.sha }}`
          files: |
            release-assets/PrivateCrossVPN-windows-latest.exe
            release-assets/PrivateCrossVPN-linux-ubuntu-20.04
            release-assets/PrivateCrossVPN-linux-ubuntu-22.04
            release-assets/PrivateCrossVPN-linux-ubuntu-24.04
            release-assets/PrivateCrossVPN-android-release.apk