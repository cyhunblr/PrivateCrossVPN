name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          $ctkPath = python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))"
          pyinstaller --noconfirm --onefile --windowed `
            --name "PrivateCrossVPN" `
            --add-data "$ctkPath;customtkinter" `
            --add-data "img;img" `
            --icon "img\logo.ico" `
            privatecrossvpn.py
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "dist\PrivateCrossVPN.exe" "release-assets\PrivateCrossVPN-windows.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: release-assets/PrivateCrossVPN-windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux binary
        run: |
          ctk_path=$(python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__path__[0]))")
          pyinstaller --noconfirm --onefile --windowed \
            --name "PrivateCrossVPN" \
            --add-data "${ctk_path}:customtkinter" \
            --add-data "img:img" \
            privatecrossvpn.py
          mkdir -p release-assets
          cp dist/PrivateCrossVPN release-assets/PrivateCrossVPN-linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: release-assets/PrivateCrossVPN-linux

  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/PrivateCrossVPN-windows.exe
            release-assets/PrivateCrossVPN-linux