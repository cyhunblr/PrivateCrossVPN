name: privatecrossvpn
description: PrivateCrossVPN mobile client for Android and iOS.
publish_to: none
version: 1.6.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # VPN protocols
  wireguard_flutter: ^0.1.3
  openvpn_flutter: ^1.3.4

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Network
  dio: ^5.7.0

  # SSH SOCKS5
  dartssh2: 2.11.0

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
